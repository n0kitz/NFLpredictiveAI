name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nfl-predictor
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: nfl-predictor/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # High-signal lint only (syntax errors + undefined names) — the standard
      # "stop the build" subset. Style/formatting is intentionally not enforced.
      - name: Lint (ruff)
        run: pip install ruff && ruff check --select E9,F63,F7,F82 src scripts

      - name: Run tests
        run: python -m pytest -q

  frontend:
    name: Frontend (build + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nfl-predictor/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: nfl-predictor/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Lint is reported but non-blocking: the codebase has pre-existing
      # react-hooks lint findings tracked separately (Wave 5 follow-up).
      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Typecheck + build
        run: npm run build

      - name: Unit tests
        run: npm test
