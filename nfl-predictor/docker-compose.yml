services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - ODDS_API_KEY=${ODDS_API_KEY:-}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.5"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"

  # Automated weekly scraper — runs every Wednesday at 06:00 UTC
  cron:
    build:
      context: .
      dockerfile: Dockerfile.cron
    volumes:
      - ./data:/app/data
    environment:
      - ODDS_API_KEY=${ODDS_API_KEY:-}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"

  # Manual one-off scrape (run with: docker compose run scraper)
  scraper:
    build:
      context: .
      dockerfile: Dockerfile.api
    volumes:
      - ./data:/app/data
    entrypoint: ["python", "-m", "src.cli.main", "--scrape", "--start", "2024", "--end", "2025"]
    profiles:
      - scrape
